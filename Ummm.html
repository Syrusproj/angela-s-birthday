    <style>
        body {
            background: #000;

            font-family: 'VT323', monospace;
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .pic {
            width: 100%;
            aspect-ratio: 1;
            background: #222;
            border: 1px solid #333;
            overflow: hidden;
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1);
            transition: 0.5s;
        }

        .pic:hover img {
            filter: grayscale(0);
            transform: scale(1.05);
        }

        .pic:hover {
            border-color: #fff;
        }

        .caption {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 20px;
        }

        .back {
            color: #555;
            text-decoration: none;
        }
    </style>
</head>
